<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent OS</title>
<style>
  :root {
    --primary:#5b6ef5; --secondary:#764ba2; --success:#38a169; --danger:#e53e3e;
    --amber:#dd6b20; --ink:#1a202c; --muted:#718096; --line:#e6e8ef; --bg:#f4f5f9; --card:#fff;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg);
         color:var(--ink); display:flex; height:100vh; overflow:hidden; }

  /* sidebar */
  .rail { width:280px; min-width:280px; background:#fff; border-right:1px solid var(--line); padding:18px 16px; overflow-y:auto; }
  .ws { font-weight:700; font-size:15px; margin-bottom:18px; }
  .rail h3 { font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:20px 0 8px; }
  .nav { font-style:italic; font-weight:600; color:var(--ink); cursor:pointer; padding:4px 0; }
  .agent-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-weight:600; }
  .plus { color:var(--success); font-weight:800; cursor:pointer; font-size:18px; line-height:1; user-select:none; }
  .plus:hover { filter:brightness(.9); }
  .sess { list-style:none; margin:2px 0 6px; padding:0; }
  .sess li { display:flex; justify-content:space-between; align-items:center; font-size:13px; color:#3a4252;
             padding:4px 8px; border-radius:6px; cursor:pointer; }
  .sess li:hover { background:#f0f2f8; }
  .sess li.active { background:#e9edfd; color:var(--primary); font-weight:600; }
  .dot { width:7px; height:7px; border-radius:50%; background:#cbd5e0; display:inline-block; margin-right:7px; }
  .dot.running { background:var(--success); }

  /* main */
  .main { flex:1; overflow-y:auto; padding:22px 26px; }
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .topbar .meta { color:var(--muted); font-size:12.5px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:14px; }
  .card .row { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; }
  .card h4 { margin:0 0 6px; font-size:15px; }
  .card .body { color:#3a4252; font-size:14px; }
  button { cursor:pointer; border:0; border-radius:8px; padding:9px 16px; font-size:13px; font-weight:600; color:#fff; background:var(--primary); white-space:nowrap; }
  button:hover { filter:brightness(1.06); }
  button.ghost { background:#eef0f6; color:var(--ink); }
  button.ok { background:var(--success); } button.no { background:var(--danger); }
  button.sm { padding:6px 12px; font-size:12.5px; }
  select,textarea,input { width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font:inherit; font-size:13px; background:#fff; }
  textarea { resize:vertical; min-height:42px; }
  label { font-size:11px; color:var(--muted); display:block; margin:0 0 4px; text-transform:uppercase; letter-spacing:.5px; }
  .compose { display:grid; grid-template-columns:200px 1fr auto; gap:10px; align-items:end; }
  .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  .lvl-head { background:#fffaf0; color:var(--amber); } .lvl-owner { background:#fff5f5; color:var(--danger); }
  .st-approved { background:#f0fff4; color:var(--success); } .st-rejected { background:#fff5f5; color:var(--danger); }
  .approval { border-color:#fbd38d; background:#fffdf7; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; }
  .feed-h { font-size:11px; text-transform:uppercase; letter-spacing:.7px; color:var(--muted); margin:6px 0 10px; }
  .term { margin-bottom:14px; }
  .term .bar { display:flex; justify-content:space-between; align-items:center; background:#1a202c; color:#cbd5e0;
               padding:8px 12px; border-radius:10px 10px 0 0; font-size:12.5px; }
  .term iframe { width:100%; height:440px; border:0; border-radius:0 0 10px 10px; background:#000; display:block; }
  .term .hint { font-size:11px; color:#a0aec0; }
  .empty { color:var(--muted); font-size:13px; }
</style>
</head>
<body>
  <aside class="rail">
    <div class="ws">⚙️ Agent OS Workspace</div>
    <div class="nav" onclick="selectTerminal(null)">Inbox</div>

    <h3>Agents</h3>
    <div id="agents"></div>

    <h3>Team</h3>
    <div class="empty" style="font-size:12px">— invite later —</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <strong style="font-size:16px">Inbox</strong>
      <span class="meta" id="meta">loading…</span>
    </div>

    <div class="card">
      <div class="compose">
        <div><label>Agent</label><select id="agent"></select></div>
        <div><label>Task</label><textarea id="task" placeholder="e.g. Blog post &lt;xyz&gt; write and publish"></textarea></div>
        <button id="run">▶ Run</button>
      </div>
      <div class="mono" id="composehint" style="color:var(--muted);margin-top:8px"></div>
    </div>

    <div class="term card" id="terminal" style="display:none; padding:0; overflow:hidden">
      <div class="bar">
        <span id="termtitle">terminal</span>
        <span class="hint">live tmux — click in and type to take over · <a href="#" style="color:#90cdf4" onclick="selectTerminal(null);return false">close</a></span>
      </div>
      <iframe id="termframe" src="about:blank"></iframe>
    </div>

    <div class="feed-h">Inbox — tasks · updates · approvals</div>
    <div id="feed"><div class="empty">No messages yet. Run an agent above.</div></div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
const EXAMPLES = {
  'Marketing Agent': 'Blog post <xyz> write and publish',
  'Engg Agent': 'Fix toggle logic, open a PR, deploy',
  'CEO Agent': 'Post an update and process a refund',
};
let STATE = { agents: [] };
let selected = null; // tmux name currently shown

async function api(method, path, body) {
  const res = await fetch(path, { method, headers: body ? { 'content-type': 'application/json' } : undefined, body: body ? JSON.stringify(body) : undefined });
  return res.json();
}

async function init() {
  STATE = await api('GET', '/api/state');
  $('meta').textContent = `tenant=${STATE.tenant} · policy=${STATE.policy}`;
  const sel = $('agent');
  sel.innerHTML = '';
  STATE.terminalAgents.forEach((a) => { const o = document.createElement('option'); o.value = a; o.textContent = a; sel.appendChild(o); });
  sel.onchange = () => { $('task').value = EXAMPLES[sel.value] || ''; };
  $('task').value = EXAMPLES[sel.value] || '';
  $('run').onclick = () => runSession(sel.value, $('task').value);
  poll();
  setInterval(poll, 1500);
}

async function runSession(agent, task) {
  if (!task.trim()) { $('composehint').textContent = '⚠ enter a task'; return; }
  $('composehint').textContent = 'spawning tmux session…';
  const r = await api('POST', '/api/sessions', { agent, task });
  if (r.error) { $('composehint').textContent = '⚠ ' + r.error; return; }
  $('composehint').textContent = 'session ' + r.id + ' started';
  selectTerminal(r.tmux, agent + ' · ' + r.id);
  poll();
}

async function poll() {
  const [sessions, messages] = await Promise.all([api('GET', '/api/sessions'), api('GET', '/api/messages')]);
  renderAgents(sessions);
  renderFeed(messages);
}

function renderAgents(sessions) {
  const el = $('agents');
  el.innerHTML = '';
  STATE.terminalAgents.forEach((agent) => {
    const wrap = document.createElement('div');
    const mine = sessions.filter((s) => s.agent === agent);
    wrap.innerHTML = `<div class="agent-row"><span>${agent}</span><span class="plus" title="new session">+</span></div>`;
    const ul = document.createElement('ul'); ul.className = 'sess';
    mine.forEach((s) => {
      const li = document.createElement('li');
      li.innerHTML = `<span><span class="dot ${s.status}"></span>${escapeHtml(s.title).slice(0,28)}</span><span class="mono" style="color:#a0aec0">${s.id}</span>`;
      li.className = selected === s.tmux ? 'active' : '';
      li.onclick = () => selectTerminal(s.tmux, s.agent + ' · ' + s.id);
      ul.appendChild(li);
    });
    wrap.appendChild(ul);
    wrap.querySelector('.plus').onclick = () => { $('agent').value = agent; $('task').value = EXAMPLES[agent] || ''; $('task').focus(); };
    el.appendChild(wrap);
  });
}

function selectTerminal(tmux, title) {
  selected = tmux;
  const t = $('terminal');
  if (!tmux) { t.style.display = 'none'; $('termframe').src = 'about:blank'; return; }
  t.style.display = 'block';
  $('termtitle').textContent = '🖥  ' + (title || tmux);
  const want = '/terminal/?arg=' + encodeURIComponent(tmux);
  if (!$('termframe').src.endsWith(want)) $('termframe').src = want;
}

function renderFeed(messages) {
  const el = $('feed');
  if (!messages.length) { el.innerHTML = '<div class="empty">No messages yet. Run an agent above.</div>'; return; }
  el.innerHTML = '';
  messages.forEach((m) => el.appendChild(card(m)));
}

function card(m) {
  const d = document.createElement('div');
  d.className = 'card' + (m.type === 'approval' ? ' approval' : '');
  if (m.type === 'approval') {
    const resolved = m.status === 'approved' || m.status === 'rejected';
    d.innerHTML = `
      <div class="row">
        <div>
          <h4><span class="pill lvl-${m.level}">${m.level} approval</span> &nbsp;${escapeHtml(m.title)}</h4>
          <div class="body mono">${escapeHtml(JSON.stringify(m.args || {}))}</div>
          <div class="body" style="color:#718096;margin-top:4px">${escapeHtml(m.body || '')}</div>
        </div>
        <div id="act-${m.approvalId}"></div>
      </div>`;
    const act = d.querySelector('#act-' + m.approvalId);
    if (resolved) {
      act.innerHTML = `<span class="pill st-${m.status}">${m.status}</span>`;
    } else {
      const ok = btn('Approve', 'ok sm', () => resolve(m.approvalId, true));
      const no = btn('Reject', 'no sm', () => resolve(m.approvalId, false));
      const box = document.createElement('div'); box.style.display='flex'; box.style.gap='6px';
      box.append(ok, no); act.appendChild(box);
    }
  } else {
    const action = m.type === 'task'
      ? btn('Open', 'sm', () => selectTerminal('aos-' + m.sessionId, m.agent + ' · ' + m.sessionId))
      : null;
    d.innerHTML = `<div class="row"><div><h4>${escapeHtml(m.title)}</h4><div class="body">${escapeHtml(m.body)}</div></div><div id="ta"></div></div>`;
    if (action) d.querySelector('#ta').appendChild(action);
  }
  return d;
}

function btn(label, cls, onclick) { const b = document.createElement('button'); b.className = cls; b.textContent = label; b.onclick = onclick; return b; }
async function resolve(id, approved) { await api('POST', '/api/approvals/' + id, { approved }); poll(); }
function escapeHtml(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

init();
</script>
</body>
</html>
