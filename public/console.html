<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent OS — Console</title>
<style>
  :root {
    --primary:#667eea; --secondary:#764ba2; --success:#38a169; --danger:#e53e3e;
    --amber:#dd6b20; --ink:#1a202c; --muted:#718096; --line:#e2e8f0; --bg:#f7fafc; --card:#fff;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { background:linear-gradient(135deg,var(--primary),var(--secondary)); color:#fff; padding:18px 24px; }
  header h1 { margin:0; font-size:19px; letter-spacing:.2px; }
  header .meta { opacity:.9; font-size:12.5px; margin-top:4px; }
  .wrap { max-width:1080px; margin:20px auto; padding:0 16px; display:grid; gap:16px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:820px){ .grid { grid-template-columns:1fr; } }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px; }
  .card h2 { margin:0 0 12px; font-size:14px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
  label { font-size:12px; color:var(--muted); display:block; margin:8px 0 4px; }
  select,textarea,input { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px;
        font-size:13px; font-family:inherit; background:#fff; }
  textarea { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; resize:vertical; min-height:64px; }
  button { cursor:pointer; border:0; border-radius:8px; padding:9px 14px; font-size:13px; font-weight:600; color:#fff;
        background:var(--primary); }
  button:hover { filter:brightness(1.05); }
  button.ghost { background:#edf2f7; color:var(--ink); }
  button.ok { background:var(--success); } button.no { background:var(--danger); }
  button.sm { padding:5px 10px; font-size:12px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .empty { color:var(--muted); font-size:13px; padding:8px 0; }
  .pill { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; }
  .s-running,.s-pending { background:#ebf4ff; color:#3182ce; }
  .s-waiting_approval { background:#fffaf0; color:var(--amber); }
  .s-completed { background:#f0fff4; color:var(--success); }
  .s-failed,.s-cancelled,.s-timeout { background:#fff5f5; color:var(--danger); }
  .lvl-head { background:#fffaf0; color:var(--amber); }
  .lvl-owner { background:#fff5f5; color:var(--danger); }
  .approval { border:1px solid #fbd38d; background:#fffdf7; border-radius:10px; padding:12px; margin-bottom:10px; }
  .approval code { background:#fff; border:1px solid var(--line); border-radius:6px; padding:1px 6px; }
  .run { border-top:1px solid var(--line); padding:10px 0; }
  .run:first-child { border-top:0; }
  .run .head { display:flex; justify-content:space-between; gap:8px; align-items:center; cursor:pointer; }
  .run .sub { color:var(--muted); font-size:12px; margin-top:3px; }
  .trail { margin-top:8px; border-left:2px solid var(--line); padding-left:10px; display:none; }
  .trail.open { display:block; }
  .ev { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11.5px; padding:2px 0; color:#2d3748; }
  .ev b { color:var(--secondary); }
  .ev .deny { color:var(--danger); font-weight:700; }
  .ev .appr { color:var(--success); font-weight:700; }
  .mono { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
  .hint { font-size:12px; color:var(--muted); margin-top:6px; }
  .agentdesc { font-size:12px; color:var(--muted); min-height:30px; margin-top:6px; }
</style>
</head>
<body>
<header>
  <h1>⚙️ Agent OS — Console</h1>
  <div class="meta" id="meta">loading…</div>
</header>

<div class="wrap">
  <div class="card">
    <h2>Launch a run</h2>
    <div class="grid" style="gap:12px">
      <div>
        <label for="agent">Agent</label>
        <select id="agent"></select>
        <div class="agentdesc" id="agentdesc"></div>
      </div>
      <div>
        <label for="inputs">Inputs (JSON)</label>
        <textarea id="inputs">{}</textarea>
        <div class="row" style="margin-top:8px">
          <button id="runbtn">▶ Run agent</button>
          <span class="hint" id="runhint"></span>
        </div>
      </div>
    </div>
    <div class="hint">Tip: run <b>refund-desk</b> with <code class="mono">{"customer":"cus_9","amountUsd":250}</code> for a head approval,
       or <code class="mono">5000</code> for an owner approval. Run <b>ops</b> to see a hard deny.</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>🟡 Approvals — your decision</h2>
      <div id="approvals"><div class="empty">No pending approvals.</div></div>
    </div>
    <div class="card">
      <h2>Runs</h2>
      <div id="runs"><div class="empty">No runs yet — launch one above.</div></div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const EXAMPLES = {
  'example-greeter': { name: 'Vikas' },
  'example-refunder': { customer: 'cus_42' },
  'refund-desk': { customer: 'cus_9', amountUsd: 250 },
  'ops': { service: 'api' },
};
let AGENTS = {};
const openTrails = new Set();

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: body ? { 'content-type': 'application/json' } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  return res.json();
}

async function init() {
  const s = await api('GET', '/api/state');
  $('meta').textContent = `tenant=${s.tenant} · policy=${s.policy} · ${s.agents.length} agents · ${s.capabilities.length} capabilities`;
  const sel = $('agent');
  sel.innerHTML = '';
  s.agents.forEach((a) => {
    AGENTS[a.id] = a;
    const o = document.createElement('option');
    o.value = a.id; o.textContent = a.id;
    sel.appendChild(o);
  });
  sel.onchange = onAgentChange;
  onAgentChange();
  $('runbtn').onclick = launch;
  poll();
  setInterval(poll, 1500);
}

function onAgentChange() {
  const id = $('agent').value;
  $('agentdesc').textContent = AGENTS[id] ? AGENTS[id].description : '';
  $('inputs').value = JSON.stringify(EXAMPLES[id] || {}, null, 2);
}

async function launch() {
  let inputs = {};
  try { inputs = JSON.parse($('inputs').value || '{}'); }
  catch { $('runhint').textContent = '⚠ inputs must be valid JSON'; return; }
  $('runhint').textContent = '';
  const r = await api('POST', '/api/runs', { agentId: $('agent').value, inputs });
  if (r.error) { $('runhint').textContent = '⚠ ' + r.error; return; }
  $('runhint').textContent = 'started ' + r.id.slice(0, 8);
  poll();
}

async function poll() {
  const [approvals, runs] = await Promise.all([api('GET', '/api/approvals'), api('GET', '/api/runs')]);
  renderApprovals(approvals);
  await renderRuns(runs);
}

function renderApprovals(items) {
  const el = $('approvals');
  if (!items.length) { el.innerHTML = '<div class="empty">No pending approvals.</div>'; return; }
  el.innerHTML = '';
  items.forEach((a) => {
    const div = document.createElement('div');
    div.className = 'approval';
    div.innerHTML = `
      <div class="row" style="justify-content:space-between">
        <span><span class="pill lvl-${a.level}">${a.level} approval</span>
          <code>${a.capability}</code></span>
        <span class="mono" style="font-size:11px;color:#718096">${a.runId.slice(0,8)}</span>
      </div>
      <div class="mono" style="font-size:12px;margin:8px 0">${escapeHtml(JSON.stringify(a.args))}</div>
      <div style="font-size:12px;color:#718096">${escapeHtml(a.reasoning || a.reason || '')}</div>
      <div class="row" style="margin-top:10px">
        <button class="ok sm" data-approve="${a.id}">Approve</button>
        <button class="no sm" data-reject="${a.id}">Reject</button>
      </div>`;
    el.appendChild(div);
  });
  el.querySelectorAll('[data-approve]').forEach((b) => b.onclick = () => resolve(b.getAttribute('data-approve'), true));
  el.querySelectorAll('[data-reject]').forEach((b) => b.onclick = () => resolve(b.getAttribute('data-reject'), false));
}

async function resolve(id, approved) {
  await api('POST', '/api/approvals/' + id, { approved });
  poll();
}

async function renderRuns(runs) {
  const el = $('runs');
  if (!runs.length) { el.innerHTML = '<div class="empty">No runs yet — launch one above.</div>'; return; }
  el.innerHTML = '';
  for (const r of runs) {
    const div = document.createElement('div');
    div.className = 'run';
    const cost = `$${r.cost.usd.toFixed(4)} · ${r.cost.tokens} tok`;
    div.innerHTML = `
      <div class="head" data-run="${r.id}">
        <span><b class="mono">${r.id.slice(0,8)}</b> &nbsp;${r.agent}
          <span class="pill s-${r.status}">${r.status.replace('_',' ')}</span></span>
        <span class="sub mono">${cost}</span>
      </div>
      <div class="sub">outcome=${r.outcome}${r.error ? ' · ' + escapeHtml(r.error) : ''}</div>
      <div class="trail ${openTrails.has(r.id) ? 'open' : ''}" id="trail-${r.id}"></div>`;
    el.appendChild(div);
    div.querySelector('.head').onclick = () => toggleTrail(r.id);
    if (openTrails.has(r.id)) loadTrail(r.id);
  }
}

function toggleTrail(id) {
  if (openTrails.has(id)) { openTrails.delete(id); $('trail-'+id).classList.remove('open'); }
  else { openTrails.add(id); $('trail-'+id).classList.add('open'); loadTrail(id); }
}

async function loadTrail(id) {
  const d = await api('GET', '/api/runs/' + id);
  const t = $('trail-' + id);
  if (!t || !d.events) return;
  t.innerHTML = d.events.map(evLine).join('') +
    `<div class="ev" style="margin-top:6px;color:#718096">eval → attempted=${d.eval.effectsAttempted} succeeded=${d.eval.effectsSucceeded} approvalsRejected=${d.eval.approvalsRejected} budgetStops=${d.eval.budgetStops} suspicious=${d.eval.suspicious}</div>`;
}

function evLine(e) {
  const d = e.data || {};
  let detail = '';
  switch (e.type) {
    case 'action.attempt': detail = `${d.capability} ${j(d.args)}`; break;
    case 'policy.decision': detail = decision(d.decision); break;
    case 'approval.requested': detail = `level=${d.level}`; break;
    case 'approval.resolved': detail = d.approved ? '<span class="appr">APPROVED</span>' : '<span class="deny">REJECTED</span>'; break;
    case 'budget.exceeded': detail = `<span class="deny">${escapeHtml(String(d.reason))}</span>`; break;
    case 'idempotency.hit': detail = 'deduped — effect already performed'; break;
    case 'action.result': detail = `ok=${d.ok} cost=${j(d.cost)}`; break;
    case 'agent.log': detail = escapeHtml(String(d.message)); break;
    case 'run.completed': detail = `outcome=${d.outcome}`; break;
    default: detail = '';
  }
  return `<div class="ev"><b>${e.type}</b> ${detail}</div>`;
}

function decision(dec) {
  if (!dec) return '';
  if (dec.effect === 'approve') return `approve (${dec.level}) — ${escapeHtml(dec.reason||'')}`;
  if (dec.effect === 'deny') return `<span class="deny">DENY — ${escapeHtml(dec.reason||'')}</span>`;
  return 'allow';
}

const j = (v) => v === undefined ? '' : escapeHtml(JSON.stringify(v));
function escapeHtml(s) { return String(s).replace(/[&<>"]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

init();
</script>
</body>
</html>
